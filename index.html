<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВЕТКА — авторская флористика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f4ee;--white:#fff;--dark:#1c1208;--mid:#7a6a56;--muted:#b5a490;
  --accent:#c67c3a;--ad:#a05f22;--soft:#f4e6d4;--border:#e2d9cc;
  --r:14px;--f:'Manrope',sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--f);background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased;}
button{font-family:var(--f);cursor:pointer;border:none;background:none;outline:none;}
img{display:block;}
/* Nav */
.nav{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:rgba(248,244,238,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-logo{font-size:20px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--dark);cursor:pointer;transition:opacity .18s;}
.nav-logo:hover{opacity:.75;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:28px;list-style:none;}
.nav-links a{font-size:13px;font-weight:500;color:var(--mid);text-decoration:none;letter-spacing:.03em;transition:color .2s;}
.nav-links a:hover{color:var(--dark);}
.nav-right{display:flex;align-items:center;gap:4px;}
.nav-cart{position:relative;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:background .2s,color .2s;}
.nav-cart:hover{background:var(--soft);color:var(--accent);}
.cart-badge{position:absolute;top:6px;right:6px;background:var(--accent);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
/* Hero */
.hero{display:grid;grid-template-columns:1fr 1fr;min-height:480px;overflow:hidden;}
.hero-text{padding:72px 52px 64px;display:flex;flex-direction:column;justify-content:center;}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.hero-eyebrow::before{content:'';display:block;width:28px;height:1px;background:var(--accent);}
.hero-h1{font-size:52px;font-weight:300;line-height:1.12;letter-spacing:-.025em;color:var(--dark);margin-bottom:22px;}
.hero-h1 strong{font-weight:800;}
.hero-p{font-size:15px;color:var(--mid);line-height:1.75;max-width:400px;margin-bottom:36px;}
.hero-cta{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;background:var(--dark);color:#fff;border-radius:99px;font-size:14px;font-weight:600;width:fit-content;transition:background .2s,transform .15s;}
.hero-cta:hover{background:var(--accent);transform:translateY(-2px);}
.hero-img{position:relative;overflow:hidden;}
.hero-img img{width:100%;height:100%;object-fit:cover;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(135deg,rgba(198,124,58,.15),transparent 60%);}
/* Ticker */
.ticker-wrap{overflow:hidden;background:var(--dark);padding:12px 0;white-space:nowrap;}
.ticker-track{display:inline-flex;animation:ticker 28s linear infinite;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ticker-item{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.65);padding:0 32px;}
.ticker-dot{color:var(--accent);}
/* Section */
.section-hd{padding:52px 52px 24px;display:flex;align-items:baseline;justify-content:space-between;}
.section-title{font-size:32px;font-weight:700;color:var(--dark);letter-spacing:-.02em;}
.section-sub{font-size:13px;color:var(--muted);font-weight:500;}
/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:260px;gap:16px;padding:0 52px 80px;}
.cat-card{position:relative;overflow:hidden;border-radius:var(--r);cursor:pointer;background-size:cover;background-position:center;transition:transform .32s ease,box-shadow .32s ease;}
.cat-card:hover{transform:scale(1.025);box-shadow:0 24px 64px rgba(28,18,8,.22);}
.cat-card.featured{grid-column:1/4;grid-row:1/3;}
.cat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(15,8,2,.78) 0%,rgba(15,8,2,.18) 55%,transparent 100%);transition:opacity .3s;}
.cat-card:hover::after{opacity:.9;}
.cat-info{position:absolute;bottom:0;left:0;right:0;padding:22px 24px;z-index:1;color:#fff;}
.cat-name{font-size:20px;font-weight:800;margin-bottom:3px;line-height:1.15;}
.cat-card.featured .cat-name{font-size:38px;margin-bottom:6px;}
.cat-desc{font-size:12.5px;opacity:.65;font-weight:500;}
.cat-card.featured .cat-desc{font-size:14px;}
.cat-count{position:absolute;top:14px;left:14px;z-index:1;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:99px;}
.cat-arrow{position:absolute;bottom:22px;right:20px;z-index:1;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;color:#fff;transform:translateX(6px);opacity:0;transition:transform .22s,opacity .22s,background .2s;}
.cat-card:hover .cat-arrow{transform:translateX(0);opacity:1;background:var(--accent);}
/* Catalog page */
.catalog-page{animation:fadeUp .32s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.catalog-hd{padding:36px 52px 0;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mid);margin-bottom:20px;}
.breadcrumb-btn{cursor:pointer;transition:color .18s;}
.breadcrumb-btn:hover{color:var(--accent);}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:99px;background:var(--white);border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--mid);transition:all .18s;margin-bottom:32px;margin-top:4px;}
.back-btn:hover{border-color:var(--dark);color:var(--dark);}
.catalog-title{font-size:44px;font-weight:800;letter-spacing:-.025em;color:var(--dark);margin-bottom:6px;}
.catalog-subdesc{font-size:15px;color:var(--mid);}
/* Masonry */
.masonry{gap:18px;padding:24px 52px 80px;}
.masonry-item{break-inside:avoid;margin-bottom:18px;}
/* Product card */
.pcard{background:var(--white);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .28s ease,box-shadow .28s ease;}
.pcard:hover{transform:translateY(-5px);box-shadow:0 16px 48px rgba(28,18,8,.12);}
.pcard-img-wrap{overflow:hidden;background:var(--soft);position:relative;}
.pcard-img{width:100%;object-fit:cover;transition:transform .45s ease;}
.pcard:hover .pcard-img{transform:scale(1.06);}
.pcard-quick{position:absolute;bottom:12px;right:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.9);color:var(--dark);display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;}
.pcard:hover .pcard-quick{opacity:1;transform:translateY(0);}
.pcard-body{padding:16px 18px 18px;}
.pcard-name{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:5px;line-height:1.3;}
.pcard-desc{font-size:12.5px;color:var(--mid);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pcard-footer{display:flex;align-items:center;justify-content:space-between;}
.pcard-price{font-size:17px;font-weight:800;color:var(--dark);}
.pcard-arrow{width:34px;height:34px;border-radius:50%;background:var(--soft);color:var(--accent);display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s,transform .18s;flex-shrink:0;}
.pcard:hover .pcard-arrow{background:var(--accent);color:#fff;transform:scale(1.1);}
/* Modal */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(28,18,8,.52);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--white);border-radius:22px;max-width:900px;width:100%;max-height:92vh;display:grid;grid-template-columns:1.1fr 1fr;overflow:hidden;animation:popIn .26s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-img-col{position:relative;overflow:hidden;background:var(--soft);}
.modal-img{width:100%;height:100%;min-height:450px;object-fit:cover;}
.modal-img-badge{position:absolute;top:18px;left:18px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
.modal-close{position:absolute;top:16px;right:16px;z-index:10;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--dark);display:flex;align-items:center;justify-content:center;transition:background .2s,transform .15s;}
.modal-close:hover{background:#fff;transform:scale(1.08);}
.modal-content{padding:40px 36px 36px;display:flex;flex-direction:column;overflow-y:auto;}
.modal-name{font-size:30px;font-weight:800;line-height:1.15;color:var(--dark);margin-bottom:6px;letter-spacing:-.02em;}
.modal-price{font-size:24px;font-weight:300;color:var(--accent);margin-bottom:20px;}
.modal-desc{font-size:14.5px;color:var(--mid);line-height:1.75;margin-bottom:28px;flex:1;}
.modal-label{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.sizes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.size-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;background:var(--bg);color:var(--mid);border:1.5px solid var(--border);transition:all .18s;}
.size-btn.sel{background:var(--dark);color:#fff;border-color:var(--dark);}
.size-btn:hover:not(.sel){border-color:var(--accent);color:var(--accent);}
.modal-actions{display:flex;gap:10px;}
.btn-add{flex:1;height:50px;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;transition:background .2s,transform .15s;}
.btn-add:hover{background:var(--ad);transform:translateY(-2px);}
.btn-add.done{background:#3a7c3f;}
.btn-bk{height:50px;padding:0 20px;border-radius:12px;background:var(--bg);color:var(--mid);font-size:14px;font-weight:500;border:1.5px solid var(--border);transition:all .18s;}
.btn-bk:hover{border-color:var(--dark);color:var(--dark);}
/* Cart */
.cart-overlay{position:fixed;inset:0;z-index:300;background:rgba(28,18,8,.38);animation:fadeIn .2s;}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;z-index:301;width:390px;background:var(--white);display:flex;flex-direction:column;animation:slideRight .28s cubic-bezier(.25,1,.5,1);}
@keyframes slideRight{from{transform:translateX(100%);}to{transform:translateX(0);}}
.cart-head{padding:28px 28px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cart-head-title{font-size:19px;font-weight:700;color:var(--dark);}
.cart-head-close{width:38px;height:38px;border-radius:50%;background:var(--bg);color:var(--mid);display:flex;align-items:center;justify-content:center;transition:all .18s;}
.cart-head-close:hover{background:var(--border);color:var(--dark);}
.cart-list{flex:1;overflow-y:auto;padding:20px 28px;}
.cart-empty{text-align:center;padding:64px 20px;color:var(--muted);font-size:14px;line-height:1.6;}
.citem{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.citem-img{width:66px;height:66px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.citem-info{flex:1;}
.citem-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:2px;}
.citem-size{font-size:12px;color:var(--mid);margin-bottom:4px;}
.citem-price{font-size:15px;font-weight:800;color:var(--accent);}
.citem-del{color:var(--muted);padding:4px;transition:color .18s;align-self:flex-start;}
.citem-del:hover{color:#c0392b;}
.cart-foot{padding:20px 28px 28px;border-top:1px solid var(--border);}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;}
.cart-total-lbl{font-size:13px;color:var(--mid);}
.cart-total-val{font-size:24px;font-weight:800;color:var(--dark);}
.btn-checkout{width:100%;height:52px;border-radius:14px;background:var(--dark);color:#fff;font-size:15px;font-weight:700;transition:background .2s;}
.btn-checkout:hover{background:#2e1e0a;}
/* Footer */
.footer{background:var(--dark);padding:56px 52px 40px;color:rgba(255,255,255,.55);}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:48px;margin-bottom:48px;}
.footer-logo{font-size:22px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#fff;margin-bottom:14px;}
.footer-logo span{color:var(--accent);}
.footer-tagline{font-size:13px;line-height:1.7;max-width:280px;}
.footer-col-title{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:16px;}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:9px;}
.footer-links a{font-size:13px;color:rgba(255,255,255,.55);text-decoration:none;transition:color .18s;}
.footer-links a:hover{color:#fff;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;font-size:12px;display:flex;justify-content:space-between;}

/* ═══════════════════════════════════
   ПАНЕЛЬ УПРАВЛЕНИЯ
═══════════════════════════════════ */
.admin-fab{position:fixed;bottom:28px;right:28px;z-index:400;width:52px;height:52px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(28,18,8,.3);transition:background .2s,transform .2s;font-size:19px;}
.admin-fab:hover{background:var(--accent);transform:scale(1.1) rotate(30deg);}
.admin-fab-tip{position:fixed;bottom:88px;right:24px;z-index:400;background:var(--dark);color:#fff;font-size:11px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;}
.admin-fab:hover ~ .admin-fab-tip{opacity:1;}

.admin-ov{position:fixed;inset:0;z-index:500;background:rgba(28,18,8,.6);backdrop-filter:blur(8px);display:flex;align-items:stretch;justify-content:flex-end;animation:fadeIn .22s ease;}
.admin-panel{width:min(920px,100%);background:var(--white);display:flex;flex-direction:column;box-shadow:-32px 0 80px rgba(28,18,8,.2);animation:slideRight .28s cubic-bezier(.25,1,.5,1);}
.admin-head{padding:20px 28px;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-head-l .at{font-size:17px;font-weight:800;}
.admin-head-l .as{font-size:12px;opacity:.45;margin-top:1px;}
.admin-head-r{display:flex;gap:8px;align-items:center;}
.admin-reset{font-size:11px;font-weight:600;padding:6px 12px;border-radius:7px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);transition:all .18s;}
.admin-reset:hover{background:rgba(255,255,255,.18);color:#fff;}
.admin-export{font-size:11px;font-weight:700;padding:6px 14px;border-radius:7px;background:var(--accent);color:#fff;transition:all .18s;}
.admin-export:hover{background:var(--ad);}
.admin-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .18s;}
.admin-x:hover{background:rgba(255,255,255,.22);}
.admin-body{flex:1;display:flex;overflow:hidden;}
.admin-sb{width:200px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);padding:16px 10px;overflow-y:auto;}
.asb-lbl{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin:14px 0 7px;}
.asb-lbl:first-child{margin-top:0;}
.asb-btn{width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:12.5px;font-weight:500;color:var(--mid);display:flex;align-items:center;justify-content:space-between;transition:all .15s;margin-bottom:2px;}
.asb-btn:hover{background:var(--border);color:var(--dark);}
.asb-btn.on{background:var(--dark);color:#fff;}
.asb-n{font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.14);flex-shrink:0;}
.asb-btn:not(.on) .asb-n{background:var(--border);color:var(--mid);}
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.admin-mh{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-mh-t{font-size:15px;font-weight:700;color:var(--dark);}
.admin-mh-t span{font-size:12px;color:var(--muted);font-weight:500;margin-left:6px;}
.btn-ap{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;transition:background .18s;}
.btn-ap:hover{background:var(--ad);}
.admin-list{flex:1;overflow-y:auto;padding:12px 22px;}
.ap-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;transition:background .15s,opacity .15s;cursor:pointer;margin-bottom:3px;}
.ap-item.dragging{opacity:.45;background:var(--bg);box-shadow:0 8px 24px rgba(0,0,0,.14);}
.asb-btn.dragging{opacity:.45;}
.drag-h{flex-shrink:0;cursor:grab;color:var(--muted);font-size:15px;line-height:1;letter-spacing:-2px;padding:4px 3px;border-radius:6px;user-select:none;-webkit-user-select:none;touch-action:none;}
.drag-h:hover{color:var(--dark);background:var(--border);}
.drag-h:active{cursor:grabbing;}
.asb-btn .drag-h{padding:2px 2px;font-size:13px;margin-right:2px;}
.asb-btn.on .drag-h{color:rgba(255,255,255,.7);}
.asb-btn.on .drag-h:hover{background:rgba(255,255,255,.18);color:#fff;}
.ap-item:hover{background:var(--bg);}
.ap-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--soft);}
.ap-no-img{width:54px;height:54px;border-radius:8px;background:var(--soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.ap-info{flex:1;min-width:0;}
.ap-name{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ap-meta{font-size:11.5px;color:var(--mid);}
.ap-price{font-size:14px;font-weight:800;color:var(--accent);white-space:nowrap;margin-right:6px;}
.ap-acts{display:flex;gap:4px;}
.apb{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.apb-e{background:var(--bg);color:var(--mid);}
.apb-e:hover{background:var(--soft);color:var(--accent);}
.apb-d{background:var(--bg);color:var(--mid);}
.apb-d:hover{background:#fde8e8;color:#c0392b;}
.admin-empty{text-align:center;padding:52px 20px;color:var(--muted);font-size:14px;line-height:1.7;}
/* Form */
.aform-wrap{position:absolute;inset:0;z-index:5;background:rgba(248,244,238,.97);overflow-y:auto;padding:24px 28px;animation:fadeUp .2s ease;}
.aform-inner{max-width:560px;margin:0 auto;}
.aform-title{font-size:20px;font-weight:800;color:var(--dark);margin-bottom:22px;}
.afl{margin-bottom:14px;}
.afl label{display:block;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.afinput,.afsel,.aftxt{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:var(--f);font-size:14px;color:var(--dark);background:var(--white);outline:none;transition:border-color .18s;}
.afinput:focus,.afsel:focus,.aftxt:focus{border-color:var(--accent);}
.aftxt{min-height:72px;resize:vertical;}
.afl-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.img-row{display:flex;gap:10px;align-items:flex-start;}
.img-prev{width:76px;height:76px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--soft);border:1.5px solid var(--border);}
.sz-editor{display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:36px;}
.sz-tag{display:flex;align-items:center;gap:4px;padding:5px 8px 5px 11px;background:var(--dark);color:#fff;border-radius:99px;font-size:12px;font-weight:600;}
.sz-del{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;transition:background .15s;line-height:1;cursor:pointer;}
.sz-del:hover{background:#c0392b;}
.sz-inp{padding:5px 10px;border:1.5px solid var(--border);border-radius:99px;font-family:var(--f);font-size:12px;width:90px;outline:none;transition:border-color .18s;}
.sz-inp:focus{border-color:var(--accent);}
.aform-foot{display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg);padding:14px 0 4px;margin-top:10px;border-top:1px solid var(--border);}
.btn-sv{flex:1;height:44px;border-radius:9px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;transition:background .18s;}
.btn-sv:hover{background:var(--ad);}
.btn-cnc{height:44px;padding:0 18px;border-radius:9px;background:var(--white);color:var(--mid);font-size:14px;font-weight:500;border:1.5px solid var(--border);transition:all .18s;}
.btn-cnc:hover{border-color:var(--dark);color:var(--dark);}
.hint{font-size:11px;color:var(--muted);margin-top:5px;}
.hint a{color:var(--accent);}
.btn-upload{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 16px;border-radius:9px;background:var(--dark);color:#fff;font-size:13px;font-weight:700;transition:background .18s;}
.btn-upload:hover{background:var(--accent);}
.img-uploaded-note{font-size:12px;color:#3a7c3f;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:6px;}

/* Responsive */
@media(max-width:1100px){.cat-grid{grid-auto-rows:220px;}.cat-card.featured .cat-name{font-size:28px;}}
@media(max-width:900px){
  .nav{padding:0 24px;}.nav-links{display:none;}
  .hero{grid-template-columns:1fr;}.hero-img{height:auto;order:-1;}.hero-img img{height:auto;object-fit:contain;}.hero-text{padding:32px 24px 36px;}.hero-h1{font-size:36px;}
  .cat-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:200px;padding:0 24px 60px;gap:12px;}
  .cat-card.featured{grid-column:1/3;grid-row:1/3;}
  .section-hd,.catalog-hd{padding-left:24px;padding-right:24px;}
  .masonry{columns:2!important;padding:24px 12px 60px;gap:12px;}
  .masonry-item{margin-bottom:12px;}
  .footer{padding:40px 24px 32px;}.footer-grid{grid-template-columns:1fr 1fr;}
  .admin-panel{width:100%;}
}
@media(max-width:600px){
  .cat-grid{grid-template-columns:1fr 1fr;grid-auto-rows:160px;gap:10px;padding:0 16px 48px;}.cat-card.featured{grid-column:1/3;grid-row:1/3;}.cat-card.featured .cat-name{font-size:22px;}
  .hero-img{height:auto;}.hero-text{padding:28px 20px 30px;}.hero-h1{font-size:30px;}.hero-eyebrow{margin-bottom:14px;}.hero-p{font-size:14px;margin-bottom:24px;}
  .modal{grid-template-columns:1fr;}.modal-img{min-height:260px;max-height:260px;}
  .cart-drawer{width:100%;}.footer-grid{grid-template-columns:1fr;gap:28px;}

  .pcard-img{height:auto!important;aspect-ratio:1/1;}
  .pcard-body{padding:12px 13px 14px;}

  .pcard-desc{display:none;}
  .pcard-price{font-size:15px;}
  .pcard-arrow{width:30px;height:30px;}
}

/* ─── Сжатие фото с компьютера в data-URL ─── */
function resizeImageFile(file, maxDim=1100, quality=0.82){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const cv=document.createElement('canvas');
        cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        try{ resolve(cv.toDataURL('image/jpeg',quality)); }catch(err){ reject(err); }
      };
      img.onerror=reject;
      img.src=ev.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

/* ─── Выбор фото: файл с компьютера или ссылка ─── */
function ImagePicker({ value, onChange, w=76, h=76 }){
  const inputRef=useRef(null);
  const [busy,setBusy]=useState(false);
  const isData=typeof value==='string' && value.startsWith('data:');
  const pick=async e=>{
    const file=e.target.files[0];
    if(!file) return;
    setBusy(true);
    try{ const d=await resizeImageFile(file); onChange(d); }
    catch{ alert('Не удалось загрузить фото. Попробуйте другой файл.'); }
    setBusy(false);
    e.target.value='';
  };
  return (
    <div className="img-row">
      <div style={{width:w,height:h,borderRadius:8,background:'var(--soft)',border:'1.5px solid var(--border)',flexShrink:0,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'26px'}}>
        {value ? <img src={value} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';}} /> : '🌸'}
      </div>
      <div style={{flex:1}}>
        <button type="button" className="btn-upload" onClick={()=>inputRef.current&&inputRef.current.click()}>
          {busy ? 'Загрузка…' : '📁 Загрузить фото с компьютера'}
        </button>
        <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}} onChange={pick} />
        {isData
          ? <div className="img-uploaded-note">✓ Фото загружено с компьютера</div>
          : <input className="afinput" value={value||''} onChange={e=>onChange(e.target.value)} placeholder="…или вставьте ссылку https://…" style={{marginTop:8}} />
        }
      </div>
    </div>
  );
}

/* ─── localStorage helpers ─── */
const DATA_VERSION = '2.0';
const load = (key, def) => { try { const s=localStorage.getItem('vetka_'+key); return s?JSON.parse(s):def; } catch{return def;} };
const save = (key, val) => { try { localStorage.setItem('vetka_'+key, JSON.stringify(val)); } catch{} };

/* СНИМОК ДАННЫХ — сюда кнопка «Экспорт» вшивает все товары/разделы/настройки */
/*__SNAPSHOT_START__*/
var SNAPSHOT = null;
/*__SNAPSHOT_END__*/
// Reset if data version changed
if (load('version','1.0') !== DATA_VERSION) {
  localStorage.removeItem('vetka_products');
  localStorage.removeItem('vetka_categories');
  save('version', DATA_VERSION);
}
// Точечное обновление обложек разделов (не трогает товары и прочие правки)
const COVER_PATCH = 'covers_2026_06_17_steklo';
if (load('cover_patch','') !== COVER_PATCH) {
  const cats = load('categories', null);
  if (cats) {
    const a = cats.find(x=>x.id==='avtorskie'); if (a) a.cover='img/cover-avtorskie.jpg';
    const k = cats.find(x=>x.id==='korziny'); if (k) k.cover='img/cover-korziny.jpg';
    const n = cats.find(x=>x.id==='neveste'); if (n) n.cover='img/cover-neveste.jpg';
    const fl = cats.find(x=>x.id==='florarium'); if (fl) fl.cover='img/cover-florarium.jpg';
    // Добавляем новый раздел «Композиция в стекле», если его ещё нет
    if (!cats.find(x=>x.id==='steklo')) {
      cats.push({id:'steklo',name:'Композиция в стекле',desc:'Цветы в стеклянных вазах и колбах',cover:'',bg:'#9caa9d'});
    }
    save('categories', cats);
  }
  const stg = load('settings', null);
  if (stg) { stg.heroImg='img/hero.png'; save('settings', stg); }
  save('cover_patch', COVER_PATCH);
}

/* ─── Navbar ─── */
function Navbar({ cartCount, onCartOpen, onHome, settings, onLogoClick }) {
  const name = (settings?.shopName||'ВЕТКА');
  const last = name.slice(-1);
  const rest = name.slice(0,-1);
  return (
    <nav className="nav">
      <div className="nav-logo" onClick={onLogoClick||onHome}>{rest}<span>{last}</span></div>
      <ul className="nav-links">
        <li><a href="#" onClick={e=>{e.preventDefault();onHome();}}>Каталог</a></li>
        <li><a href="#">О нас</a></li>
        <li><a href="#">Доставка</a></li>
        <li><a href="#">Контакты</a></li>
      </ul>
      <div className="nav-right">
        <button className="nav-cart" onClick={onCartOpen}>{Ico.bag}{cartCount>0&&<span className="cart-badge">{cartCount}</span>}</button>
      </div>
    </nav>
  );
}

/* ─── Hero ─── */
function Hero({ onShop, settings }) {
  const s = {...DEFAULT_SETTINGS, ...(settings||{})};
  const lines = (s.heroTitle||'').split(',').map(l=>l.trim());
  return (
    <section className="hero">
      <div className="hero-text">
        <div className="hero-eyebrow">авторская флористика</div>
        <h1 className="hero-h1">
          {lines.map((l,i)=>(
            <React.Fragment key={i}>
              {i===lines.length-1 ? <strong>{l}</strong> : l}
              {i<lines.length-1 && <br/>}
            </React.Fragment>
          ))}
        </h1>
        <p className="hero-p">{s.heroSubtitle}</p>
        <button className="hero-cta" onClick={onShop}>Смотреть каталог {Ico.arrow}</button>
      </div>
      <div className="hero-img">
        {s.heroImg
          ? <img src={s.heroImg} alt="Главное фото" onError={e=>e.target.style.opacity='.3'} />
          : <div style={{width:'100%',height:'100%',background:'var(--soft)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'72px'}}>🌸</div>
        }
        <div className="hero-ov"></div>
      </div>
    </section>
  );
}

/* ─── Ticker ─── */
function Ticker() {
  const t=['Авторские букеты','•','Доставка в день заказа','•','Корзины и коробки','•','Флорариумы','•','Цветы в тыкве','•','Свадебные букеты','•'];
  const all=[...t,...t,...t,...t];
  return (
    <div className="ticker-wrap">
      <div className="ticker-track">
        {all.map((x,i)=><span key={i} className={x==='•'?'ticker-item ticker-dot':'ticker-item'}>{x}</span>)}
      </div>
    </div>
  );
}

/* ─── CategoryGrid ─── */
function CategoryGrid({ categories, products, onSelect }) {
  const counts = {};
  categories.forEach(c=>{ counts[c.id]=products.filter(p=>p.catId===c.id).length; });
  return (
    <>
      <div className="section-hd">
        <div className="section-title">Каталог</div>
        <div className="section-sub">{categories.length} разделов</div>
      </div>
      <div className="cat-grid">
        {categories.map(cat=>(
          <div key={cat.id} className={`cat-card${cat.featured?' featured':''}`}
            style={{backgroundImage:`url(${cat.cover})`,backgroundColor:cat.bg}}
            onClick={()=>onSelect(cat)}>
            <div className="cat-count">{counts[cat.id]} поз.</div>
            <div className="cat-info">
              <div className="cat-name">{cat.name}</div>
              <div className="cat-desc">{cat.desc}</div>
            </div>
            <div className="cat-arrow">{Ico.arrow}</div>
          </div>
        ))}
      </div>
    </>
  );
}

/* ─── ProductCard ─── */
function ProductCard({ p, onSelect }) {
  return (
    <div className="masonry-item" onClick={()=>onSelect(p)}>
      <div className="pcard">
        <div className="pcard-img-wrap">

/* ─── Drag-to-reorder (touch + mouse) via drag handles ─── */
function useReorder(containerRef, itemsRef, idKey, onReorderRef, deps){
  const [dragId,setDragId]=useState(null);
  useEffect(()=>{
    const root=containerRef.current;
    if(!root) return;
    let active=false, curId=null;
    const idAt=(x,y)=>{
      const el=document.elementFromPoint(x,y);
      const it=el&&el.closest&&el.closest('[data-rid]');
      if(it) return it.getAttribute('data-rid');
      // fallback: find the row whose box the pointer is within (robust on mobile / scrolled lists)
      const nodes=root.querySelectorAll('[data-rid]');
      for(const node of nodes){ const r=node.getBoundingClientRect(); if(y>=r.top&&y<=r.bottom) return node.getAttribute('data-rid'); }
      return null;
    };
    const reorder=(toId)=>{
      if(!active||curId==null||toId==null||String(toId)===String(curId)) return;
      const arr=itemsRef.current.slice();
      const from=arr.findIndex(o=>String(o[idKey])===String(curId));
      const to=arr.findIndex(o=>String(o[idKey])===String(toId));
      if(from<0||to<0) return;
      const [m]=arr.splice(from,1); arr.splice(to,0,m);
      onReorderRef.current(arr);
    };
    const begin=(id)=>{ active=true; curId=id; setDragId(id); if(navigator.vibrate)try{navigator.vibrate(12);}catch(e){} };
    const stop=()=>{ if(active){active=false;curId=null;setDragId(null);} };
    const handleId=(target)=>{ const h=target.closest&&target.closest('[data-draghandle]'); if(!h)return null; const t=h.closest('[data-rid]'); return t?t.getAttribute('data-rid'):null; };
    const onTS=(e)=>{ const id=handleId(e.target); if(id==null)return; begin(id); };
    const onTM=(e)=>{ if(!active)return; const tt=e.touches[0]; if(!tt)return; e.preventDefault(); reorder(idAt(tt.clientX,tt.clientY)); };
    const onTE=()=>stop();
    const onMD=(e)=>{ const id=handleId(e.target); if(id==null)return; e.preventDefault(); begin(id); };
    const onMM=(e)=>{ if(!active)return; e.preventDefault(); reorder(idAt(e.clientX,e.clientY)); };
    const onMU=()=>stop();
    root.addEventListener('touchstart',onTS,{passive:true});
    root.addEventListener('touchmove',onTM,{passive:false});
    root.addEventListener('touchend',onTE);
    root.addEventListener('touchcancel',onTE);
    root.addEventListener('mousedown',onMD);
    window.addEventListener('mousemove',onMM);
    window.addEventListener('mouseup',onMU);
    return ()=>{
      root.removeEventListener('touchstart',onTS);
      root.removeEventListener('touchmove',onTM);
      root.removeEventListener('touchend',onTE);
      root.removeEventListener('touchcancel',onTE);
      root.removeEventListener('mousedown',onMD);
      window.removeEventListener('mousemove',onMM);
      window.removeEventListener('mouseup',onMU);
    };
  }, deps||[]);
  return dragId;
}

  const f=(field,val)=>setForm(prev=>({...prev,[field]:val}));

  // Экспорт готового сайта с вшитыми данными
  const exportSite=async()=>{
    try{
      const res=await fetch(location.href,{cache:'no-store'});
      let src=await res.text();
      const A='/*__SNAPSHOT_START__*/', B='/*__SNAPSHOT_END__*/';
      const i=src.indexOf(A), j=src.indexOf(B);
      if(i<0||j<0){ alert('Не удалось найти место для данных в файле.'); return; }
      const snap={products,categories,settings};
      const inject=A+'\nvar SNAPSHOT = '+JSON.stringify(snap)+';\n'+B;
      src=src.slice(0,i)+inject+src.slice(j+B.length);
      const blob=new Blob([src],{type:'text/html'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='index.html';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    }catch(e){
      alert('Экспорт работает только на опубликованном сайте или в превью (не из локального файла на компьютере).\n\n'+e.message);

            {/* ── PRODUCTS TAB ── */}
            {tab==='products'&&(<>
            <div className="admin-mh">
              <div className="admin-mh-t">{activeCat?.name}<span>{catProducts.length} товаров</span></div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-ap" onClick={openCatEdit} style={{background:'var(--white)',color:'var(--mid)',border:'1.5px solid var(--border)'}} title="Изменить название и заглавное фото раздела">🖼 Фото раздела</button>
                <button className="btn-ap" onClick={openAdd}>+ Добавить товар</button>
              </div>
            </div>

            <div className="admin-list" ref={prodListRef}>
              {catProducts.length===0
                ? <div className="admin-empty">
                    <div style={{fontSize:'36px',marginBottom:'12px'}}>🌸</div>
                    В этом разделе пока нет товаров.<br />
                    Нажмите «+ Добавить товар» чтобы начать.
                  </div>
                : catProducts.map(p=>(
                  <div key={p.id} data-rid={p.id} className={`ap-item${prodDragId===String(p.id)?' dragging':''}`} onClick={()=>openEdit(p)}>
                    <span className="drag-h" data-draghandle onClick={e=>e.stopPropagation()} title="Перетащите, чтобы поменять порядок">⋮⋮</span>
                    {p.img
                      ? <img className="ap-thumb" src={p.img} alt={p.name} onError={e=>{e.target.style.display='none';}} />
                      : <div className="ap-no-img">🌸</div>
                    }
                    <div className="ap-info">
                      <div className="ap-name">{p.name}</div>
                      <div className="ap-meta">{p.sizes.slice(0,3).join(' · ')}</div>
                    </div>
                    <div className="ap-price">{fmt(p.price)}</div>
                    <div className="ap-acts" onClick={e=>e.stopPropagation()}>
                      <button className="apb apb-e" onClick={()=>openEdit(p)} title="Редактировать">{Ico.edit}</button>
                      <button className="apb apb-d" onClick={e=>doDel(p.id,e)} title="Удалить">{Ico.trash}</button>
                    </div>
                  </div>
                ))
              }
            </div>

            {/* Edit category (cover / name) form */}
            {catForm&&(
              <div className="aform-wrap">
                <div className="aform-inner">
                  <div className="aform-title">🖼 Раздел каталога</div>
                  <div className="afl">
                    <label>Название раздела *</label>
                    <input className="afinput" value={catForm.name} onChange={e=>cf('name',e.target.value)} placeholder="Авторские букеты" />
                  </div>
                  <div className="afl">
                    <label>Краткое описание</label>
                    <input className="afinput" value={catForm.desc} onChange={e=>cf('desc',e.target.value)} placeholder="Уникальные авторские композиции" />
                  </div>
                  <div className="afl">
                    <label>Заглавное фото раздела</label>
                    <ImagePicker value={catForm.cover} onChange={d=>cf('cover',d)} w={96} h={72} />
                    <div className="hint">Нажмите «Загрузить фото с компьютера» и выберите файл — или вставьте ссылку</div>
                  </div>
                  <div className="aform-foot">
                    <button className="btn-sv" onClick={doCatSave}>💾 Сохранить</button>
                    <button className="btn-cnc" onClick={closeCatForm}>Отмена</button>
                  </div>
                </div>
              </div>
            )}

            {/* Edit / Add form */}
            {form&&(
              <div className="aform-wrap">
                <div className="aform-inner">
                  <div className="aform-title">{isNew?'➕ Новый товар':'✏️ Редактировать товар'}</div>

                  <div className="afl">
                    <label>Раздел каталога</label>
                    <select className="afsel" value={form.catId} onChange={e=>f('catId',e.target.value)}>
                      {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  </div>

                  <div className="afl-2">
                    <div className="afl" style={{margin:0}}>
                      <label>Название товара *</label>
                      <input className="afinput" value={form.name} onChange={e=>f('name',e.target.value)} placeholder="Например: Пудровый сон" />
                    </div>
                    <div className="afl" style={{margin:0}}>
                      <label>Цена (₸) *</label>
                      <input className="afinput" type="number" value={form.price} onChange={e=>f('price',e.target.value)} placeholder="9000" />
                    </div>
                  </div>

                  <div className="afl">
                    <label>Описание</label>
                    <textarea className="aftxt" value={form.desc} onChange={e=>f('desc',e.target.value)} placeholder="Краткое описание товара..." />
                  </div>

                  <div className="afl">
                    <label>Фотография товара</label>
                    <ImagePicker value={form.img} onChange={d=>f('img',d)} w={76} h={76} />
                    <div className="hint">Нажмите «Загрузить фото с компьютера» и выберите файл — или вставьте ссылку</div>
                  </div>

                  <div className="afl-2">
                    <div className="afl" style={{margin:0}}>
                      <label>Высота карточки: {form.h}px</label>
                      <input type="range" min="160" max="480" step="10" value={form.h}
                        onChange={e=>f('h',parseInt(e.target.value))}
                        style={{width:'100%',marginTop:'10px',accentColor:'var(--accent)'}} />
                      <div className="hint" style={{marginTop:4}}>Меньше — горизонтальная, больше — вертикальная</div>
                    </div>
                    <div className="afl" style={{margin:0}}>
                      <label>Размеры / комплектации</label>
                      <div className="sz-editor" style={{marginTop:6}}>
                        {form.sizes.map(s=>(
                          <span key={s} className="sz-tag">
                            {s}
                            <span className="sz-del" onClick={()=>rmSz(s)}>✕</span>
                          </span>
                        ))}
                        <input className="sz-inp" value={szInp}
                          onChange={e=>setSzInp(e.target.value)}
                          onKeyDown={e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addSz();}}}
                          placeholder="+ добавить" />
                      </div>
                      <div className="hint" style={{marginTop:4}}>Enter — добавить размер</div>
                    </div>
                  </div>

                  <div className="aform-foot">
                    <button className="btn-sv" onClick={doSave}>💾 Сохранить</button>
                    <button className="btn-cnc" onClick={closeForm}>Отмена</button>
                  </div>
                </div>
              </div>
            )}
            </>)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [products,setProducts]=useState(()=>load('products',(SNAPSHOT&&SNAPSHOT.products)||DEFAULT_PRODUCTS));
  const [categories,setCategories]=useState(()=>load('categories',(SNAPSHOT&&SNAPSHOT.categories)||DEFAULT_CATEGORIES));
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS, ...load('settings',(SNAPSHOT&&SNAPSHOT.settings)||DEFAULT_SETTINGS)}));
  const [view,setView]=useState('home');
  const [activeCat,setActiveCat]=useState(null);
  const [adminAuth,setAdminAuth]=useState(false);
  const [showPwPrompt,setShowPwPrompt]=useState(false);
  const [pwInput,setPwInput]=useState('');
  const [pwError,setPwError]=useState(false);
  const ADMIN_PW = load('admin_pw','vetka2026');
  const tryLogin=()=>{
    if(pwInput===ADMIN_PW){setAdminAuth(true);setAdminOpen(true);setShowPwPrompt(false);setPwInput('');setPwError(false);}
    else{setPwError(true);setTimeout(()=>setPwError(false),1500);}
  };
  const [selProduct,setSelProduct]=useState(null);
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [adminOpen,setAdminOpen]=useState(false);
  const catalogRef=useRef(null);

  // Save products to localStorage on change
  useEffect(()=>{ save('products',products); },[products]);
  useEffect(()=>{ save('categories',categories); },[categories]);

  const goToCategory=useCallback(cat=>{ setActiveCat(cat); setView('catalog'); window.scrollTo({top:0,behavior:'smooth'}); },[]);
  const [logoClicks,setLogoClicks]=useState(0);
  const [logoTimer,setLogoTimer]=useState(null);
  const handleLogoClick=()=>{
    const next=logoClicks+1;
    if(next>=5){setLogoClicks(0);clearTimeout(logoTimer);setShowPwPrompt(true);return;}
    setLogoClicks(next);
    clearTimeout(logoTimer);
    const t=setTimeout(()=>setLogoClicks(0),2000);
    setLogoTimer(t);
  };
  const goHome=useCallback(()=>{ setView('home'); setActiveCat(null); window.scrollTo({top:0,behavior:'smooth'}); },[]);
  const scrollToCatalog=()=>{ if(catalogRef.current){ const y=catalogRef.current.getBoundingClientRect().top+window.scrollY-80; window.scrollTo({top:y,behavior:'smooth'}); } };
  const addToCart=useCallback(p=>setCart(prev=>[...prev,p]),[]);
  const removeFromCart=useCallback(i=>setCart(prev=>prev.filter((_,idx)=>idx!==i)),[]);

  useEffect(()=>{ document.body.style.overflow=(selProduct||cartOpen||adminOpen)?'hidden':''; return()=>{document.body.style.overflow=''}; },[selProduct,cartOpen,adminOpen]);

  return (
    <div>
      <Navbar cartCount={cart.length} onCartOpen={()=>setCartOpen(true)} onHome={goHome} settings={settings} onLogoClick={handleLogoClick} />

      {view==='home'&&(
        <>
          <Hero onShop={scrollToCatalog} settings={settings} />
          <Ticker />
          <div ref={catalogRef}>
            <CategoryGrid categories={categories} products={products} onSelect={goToCategory} />
          </div>
          <Footer categories={categories} settings={settings} />
        </>
      )}

      {view==='catalog'&&activeCat&&(
        <>
          <CatalogPage key={activeCat.id} cat={activeCat} products={products} onBack={goHome} onSelect={setSelProduct} />
          <Footer categories={categories} settings={settings} />
        </>
      )}

      {selProduct&&<ProductModal p={selProduct} categories={categories} settings={settings} onClose={()=>setSelProduct(null)} onAdd={p=>{addToCart(p);}} />}
      {cartOpen&&<CartDrawer items={cart} onClose={()=>setCartOpen(false)} onRemove={removeFromCart} />}
      {adminOpen&&adminAuth&&<AdminPanel products={products} categories={categories} onProductsChange={setProducts} onCategoriesChange={setCategories} settings={settings} onSettingsChange={setSettings} onClose={()=>{setAdminOpen(false);setAdminAuth(false);}} />}

      {/* Пароль */}
      {showPwPrompt&&(
        <div className="overlay" onClick={()=>{setShowPwPrompt(false);setPwInput('');}} style={{zIndex:450}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,padding:'36px 32px',width:340,animation:'popIn .24s cubic-bezier(.34,1.56,.64,1)'}}>
            <div style={{fontSize:28,textAlign:'center',marginBottom:8}}>🔐</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--dark)',textAlign:'center',marginBottom:4}}>Панель управления</div>
            <div style={{fontSize:13,color:'var(--mid)',textAlign:'center',marginBottom:24}}>Введите пароль администратора</div>
            <input
              autoFocus
              type="password"
              className="afinput"
              value={pwInput}
              onChange={e=>setPwInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&tryLogin()}
              placeholder="Пароль"
              style={{marginBottom:8,border:pwError?'1.5px solid #e74c3c':'',transition:'border .2s'}}
            />
            {pwError&&<div style={{fontSize:12,color:'#e74c3c',marginBottom:8,textAlign:'center'}}>Неверный пароль</div>}
            <button className="btn-sv" style={{width:'100%',marginTop:4}} onClick={tryLogin}>Войти</button>
            <div style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginTop:14}}>Пароль по умолчанию: <b>vetka2026</b><br/>Смените в настройках панели</div>
          </div>
        </div>
      )}

      {/* Секретный вход: нажмите на логотип 5 раз быстро */}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
